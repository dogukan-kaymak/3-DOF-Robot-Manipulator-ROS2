controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0  # Hz

joint_trajectory_controller:
  ros__parameters:
    joints:
      - r1
      - r2
      - r3
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
